name: Votometro Live Sync

on:
  schedule:
    - cron: "30 5 * * *"
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

concurrency:
  group: votometro-sync
  cancel-in-progress: true

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
  PYTHON_VERSION: "3.11"

jobs:
  sync-votometro:
    name: Sync Votometro public data
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Validate required secrets
        id: check_secrets
        run: |
          missing=""
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then missing="$missing SUPABASE_URL"; fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then missing="$missing SUPABASE_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::warning::Secrets not configured ($missing) — skipping Votometro sync."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements-phase1.txt

      - name: Resolve mode
        if: steps.check_secrets.outputs.skip != 'true'
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "0 6 * * 0" ]; then
              MODE="weekly"
            else
              MODE="daily"
            fi
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: Run Votometro sync
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.ingestion.votometro.sync --mode=${{ steps.mode.outputs.mode }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.check_secrets.outputs.skip != 'true' && always()
        with:
          name: votometro-sync-${{ github.run_id }}
          path: |
            data/processed/last_run.json
          retention-days: 14
          if-no-files-found: ignore
