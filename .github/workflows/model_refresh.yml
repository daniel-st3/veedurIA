name: Weekly Model Retraining

on:
  # Every Sunday at 3:00 AM UTC
  schedule:
    - cron: "0 3 * * 0"

  # Manual trigger for ad-hoc retraining
  workflow_dispatch:
    inputs:
      contamination:
        description: "Contamination rate (default 0.05, fallback 0.03)"
        required: false
        default: "0.05"
        type: string

# Prevent overlapping runs
concurrency:
  group: model-refresh
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PYTHON_VERSION: "3.11"

jobs:
  retrain-model:
    name: Retrain Isolation Forest Model
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Soft-skip when secrets are missing ───────────────────────────────
      # Emits a warning and sets skip=true so subsequent steps are skipped
      # gracefully. Run shows as ✅ (skipped steps) rather than ❌ (failure).
      - name: Validate required secrets
        id: check_secrets
        run: |
          missing=""
          if [ -z "${{ secrets.SOCRATA_APP_TOKEN }}" ]; then missing="$missing SOCRATA_APP_TOKEN"; fi
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then missing="$missing SUPABASE_URL"; fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then missing="$missing SUPABASE_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::warning::Secrets not configured ($missing) — skipping model retraining."
            echo "Add them at: Settings > Secrets and variables > Actions"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "All required secrets are configured."
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_CONTENTS_WRITE || github.token }}
          persist-credentials: true

      - name: Set up Python
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements-phase1.txt

      - name: Train model
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.models.isolation_forest --action=train --contamination=${{ github.event.inputs.contamination || '0.05' }}

      - name: Score contracts with refreshed model
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.models.isolation_forest --action=score

      - name: Validate model against reference cases
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.models.model_validator

      - name: Upload scored parquet to Supabase and persist state
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path

          from src.ingestion.secop_client import load_last_run, save_last_run, upload_to_supabase

          scored_path = Path("data/processed/scored_contracts.parquet")
          if not scored_path.exists():
              raise SystemExit("scored_contracts.parquet not found after scoring")

          upload_result = upload_to_supabase(scored_path)
          if not upload_result:
              raise SystemExit("Supabase upload of scored_contracts.parquet failed")

          state = load_last_run()
          now = datetime.now(timezone.utc).isoformat()
          state["scored_remote_path"] = upload_result["remote_path"]
          state["scored_uploaded_at"] = now
          save_last_run(state)
          PY

      - name: Commit refreshed model metadata
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/last_run.json
          git add -f data/processed/models/*.joblib
          git add data/processed/models/*_metadata.json
          git add data/processed/models/validation_results.json
          if git diff --cached --quiet; then
            echo "No refreshed model artifacts to commit."
            exit 0
          fi
          git commit -m "chore: refresh isolation forest artifacts [skip ci]"
          git push

      - name: Upload model metadata artifact
        uses: actions/upload-artifact@v4
        if: steps.check_secrets.outputs.skip != 'true' && always()
        with:
          name: model-metadata-${{ github.run_id }}
          path: |
            data/processed/models/*_metadata.json
            data/processed/models/validation_results.json
            data/processed/scored_contracts.parquet
          retention-days: 30
          if-no-files-found: ignore
