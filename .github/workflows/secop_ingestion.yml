name: SECOP Incremental Ingestion

on:
  # Once per day at 03:00 UTC (10:00 PM Colombia time)
  schedule:
    - cron: "0 3 * * *"

  # Manual trigger for testing or emergency backfill
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingestion mode (incremental or backfill)"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - backfill

# Prevent overlapping runs
concurrency:
  group: secop-ingestion
  cancel-in-progress: true

env:
  SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PYTHON_VERSION: "3.11"

jobs:
  ingest-secop:
    name: Ingest SECOP II Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Fix B: Soft-skip when secrets are missing ─────────────────────
      # Instead of exit 1 (red ❌ email), we emit a warning and set
      # skip=true so all subsequent steps are skipped gracefully.
      # The run shows as ✅ (skipped steps) rather than ❌ (failure).
      - name: Validate required secrets
        id: check_secrets
        run: |
          missing=""
          if [ -z "${{ secrets.SOCRATA_APP_TOKEN }}" ]; then missing="$missing SOCRATA_APP_TOKEN"; fi
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then missing="$missing SUPABASE_URL"; fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then missing="$missing SUPABASE_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::warning::Secrets not configured ($missing) — skipping ingestion run."
            echo "Add them at: Settings > Secrets and variables > Actions"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "All required secrets are configured."
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_CONTENTS_WRITE || github.token }}

      - name: Set up Python
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements-phase1.txt

      - name: Run ingestion
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.ingestion.secop_client --mode=${{ github.event.inputs.mode || 'incremental' }}

      - name: Re-score contracts with latest trained model
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.models.isolation_forest --action=score

      # ── Fix C: continue-on-error for the commit step ──────────────────
      # PAT_CONTENTS_WRITE may not be configured — don't fail the run
      # just because we couldn't persist last_run.json.
      - name: Commit last_run.json update
        if: steps.check_secrets.outputs.skip != 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/last_run.json
          git add data/processed/scored_contracts.parquet
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: refresh SECOP scored data [skip ci]"
          git push || echo "::warning::Could not push refreshed state (PAT_CONTENTS_WRITE may not be configured). Ingestion succeeded but the refreshed files were not persisted."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.check_secrets.outputs.skip != 'true' && always()
        with:
          name: ingestion-artifacts-${{ github.run_id }}
          path: |
            data/processed/last_run.json
            data/processed/scored_contracts.parquet
            data/processed/*.parquet
          retention-days: 7
          if-no-files-found: ignore
