name: SECOP Incremental Ingestion

on:
  # Once per day at 03:00 UTC (10:00 PM Colombia time)
  # Reduced from */15 to cut CI noise while stabilizing.
  schedule:
    - cron: "0 3 * * *"

  # Manual trigger for testing or emergency backfill
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingestion mode (incremental or backfill)"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - backfill

# Prevent overlapping runs
concurrency:
  group: secop-ingestion
  cancel-in-progress: true

env:
  SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PYTHON_VERSION: "3.11"

jobs:
  ingest-secop:
    name: Ingest SECOP II Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate required secrets
        run: |
          missing=""
          if [ -z "${{ secrets.SOCRATA_APP_TOKEN }}" ]; then missing="$missing SOCRATA_APP_TOKEN"; fi
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then missing="$missing SUPABASE_URL"; fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then missing="$missing SUPABASE_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::error::Skipping incremental ingestion: required secret(s) not set:$missing"
            echo "Please configure these in Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT if available (needed for pushing commits), otherwise default token
          token: ${{ secrets.PAT_CONTENTS_WRITE || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-phase1.txt

      - name: Run ingestion
        run: |
          python -m src.ingestion.secop_client --mode=${{ github.event.inputs.mode || 'incremental' }}

      - name: Commit last_run.json update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/last_run.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update last_run.json [skip ci]"
          git push || echo "::warning::Could not push last_run.json (PAT_CONTENTS_WRITE may not be configured). Ingestion succeeded but state was not persisted."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ingestion-artifacts-${{ github.run_id }}
          path: |
            data/processed/last_run.json
            data/processed/*.parquet
          retention-days: 7
          if-no-files-found: ignore
