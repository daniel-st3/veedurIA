name: SECOP Daily Ingestion and Scoring

on:
  schedule:
    - cron: "0 5 * * *" # Daily at 00:00 America/Bogota
  # Manual trigger for testing or emergency backfill
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingestion mode (incremental or backfill)"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - backfill
      reason:
        description: "Dispatch reason"
        required: false
        default: "manual"
        type: string

# Prevent overlapping runs
concurrency:
  group: secop-ingestion
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
  PYTHON_VERSION: "3.11"

jobs:
  ingest-secop:
    name: Ingest and score SECOP II contracts
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── Fix B: Soft-skip when secrets are missing ─────────────────────
      # Instead of exit 1 (red ❌ email), we emit a warning and set
      # skip=true so all subsequent steps are skipped gracefully.
      # The run shows as ✅ (skipped steps) rather than ❌ (failure).
      - name: Validate required secrets
        id: check_secrets
        run: |
          missing=""
          if [ -z "${{ secrets.SOCRATA_APP_TOKEN }}" ]; then missing="$missing SOCRATA_APP_TOKEN"; fi
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then missing="$missing SUPABASE_URL"; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_KEY }}" ]; then missing="$missing SUPABASE_SERVICE_KEY"; fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then missing="$missing SUPABASE_KEY"; fi
          if [ -z "${{ secrets.SUPABASE_STORAGE_BUCKET }}" ]; then missing="$missing SUPABASE_STORAGE_BUCKET"; fi
          if [ -n "$missing" ]; then
            echo "::warning::Secrets not configured ($missing) — skipping ingestion run."
            echo "Add them at: Settings > Secrets and variables > Actions"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "All required secrets are configured."
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_CONTENTS_WRITE || github.token }}
          persist-credentials: true

      - name: Set up Python
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements-phase1.txt

      - name: Run ingestion
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.ingestion.secop_client --mode=${{ github.event.inputs.mode || 'incremental' }}

      - name: Re-score contracts with latest trained model
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m src.models.isolation_forest --action=score

      - name: Merge incremental scoring with Supabase historical snapshot
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python scripts/merge_scored_contracts.py

      - name: Upload scored parquet to Supabase and persist state
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path

          from src.ingestion.secop_client import load_last_run, save_last_run, upload_to_supabase

          scored_path = Path("data/processed/scored_contracts.parquet")
          if not scored_path.exists():
              raise SystemExit("scored_contracts.parquet not found after scoring")

          upload_result = upload_to_supabase(scored_path)
          if not upload_result:
              raise SystemExit("Supabase upload of scored_contracts.parquet failed")

          state = load_last_run()
          now = datetime.now(timezone.utc).isoformat()
          state["scored_remote_path"] = upload_result["remote_path"]
          state["scored_uploaded_at"] = now
          save_last_run(state)
          PY

      - name: Upsert red+yellow contracts to Supabase Postgres
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python scripts/import_contracts_to_postgres.py --full

      - name: Rebuild SigueElDinero network snapshot
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python - <<'PY'
          from src.processing.graph_builder import build_network_graph, current_cache_key

          build_network_graph(current_cache_key(), "es")
          PY

      - name: Commit last_run.json update
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/last_run.json data/processed/network_graph_meta.json
          if git diff --cached --quiet; then
            echo "No refreshed state to commit."
            exit 0
          fi
          git commit -m "chore: refresh SECOP state [skip ci]"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.check_secrets.outputs.skip != 'true' && always()
        with:
          name: ingestion-artifacts-${{ github.run_id }}
          path: |
            data/processed/last_run.json
            data/processed/scored_contracts.parquet
            data/processed/*.parquet
          retention-days: 7
          if-no-files-found: ignore
